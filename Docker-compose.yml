services:
  db-docker:
    image: postgres:15
    container_name: LMS_container
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: lms-db
    ports:
      - "5444:5432"
    volumes:
      - baza_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: otp_redis
    restart: always
    ports:
      - "6379:6379"

  app:
    build:
      context: .
      args:
        - DATABASE_URL=postgres://postgres:admin@db-docker:5432/lms-db
    container_name: my_app
    restart: always
    env_file:
      - .env
    ports:
      - "4000:3000"
    depends_on:
      - db-docker
      - redis
    command: sh -c "npx prisma migrate deploy && npx prisma generate && npm run start:dev"
    environment:
      DATABASE_URL: postgres://postgres:admin@db-docker:5432/lms-db
      HOST: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
    volumes:                  # ✅ app ichida
      - .:/app
      - /app/node_modules

volumes:                      # ✅ eng pastda, chiziqsiz
  baza_data: