services:
  - type: web
    name: lms-app
    env: docker
    plan: starter
    dockerfilePath: Dockerfile
    autoDeploy: true
    services:
      - lms-redis
    databases:
      - lms-db
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lms-db
      - key: REDIS_URL
        fromService:
          name: lms-redis
      - key: REDIS_HOST
        value: "lms-redis"
      - key: REDIS_PORT
        value: "6379"
      - key: JWT_SECRET
        value: "<YOUR_JWT_SECRET>"
      - key: JWT_EXPIRES_IN
        value: "24h"
      - key: CLOUDINARY_CLOUD_NAME
        value: "<YOUR_CLOUDINARY_CLOUD_NAME>"
      - key: CLOUDINARY_API_KEY
        value: "<YOUR_CLOUDINARY_API_KEY>"
      - key: CLOUDINARY_API_SECRET
        value: "<YOUR_CLOUDINARY_API_SECRET>"

  - type: redis
    name: lms-redis
    plan: starter

databases:
  - name: lms-db
    engine: postgres
    plan: starter
